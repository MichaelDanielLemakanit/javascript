<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="">
    <div class="container">
        <div>
            <div class="d-flex justify-content-center bg-info">
                <p>Tax Project</p>
            </div>

            <!-- form -->
            <div>
                <form id="tax_form">
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Basic Salary</label>
                        <input type="number" class="form-control" id="basic" aria-describedby="emailHelp">
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Benefits</label>
                        <input type="number" class="form-control" id="benefits">
                    </div>
                    <button type="submit" class="btn btn-success">Calculate Tax</button>
                </form>
            </div>


            <!-- table -->
            <div class="container p-4">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th scope="col">Tax Category</th>
                            <th scope="col">Value (Ksh.)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="text-bg-secondary">Gross Salary</td>
                            <td id="gross"></td>
                        </tr>
                        <tr>
                            <td class="bg-warning">NHIF</td>
                            <td></td>
                        </tr>
                        <tr>
                            <td class="text-bg-primary">NSSF</td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>




    </div>
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
