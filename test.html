<script>
    .progress - container {
        width: 300px;
        background - color: #ddd;
        border - radius: 5px;
    }

    #progress - bar {
        width: 0 %; /* Starts at 0 width */
        height: 30px;
        background - color: #04AA6D;
        text - align: center;
        line - height: 30px;
        color: white;
        border - radius: 5px;
    }
</script>

<body>
    <div class="progress-container">
        <div id="progress-bar">0%</div>
    </div>
